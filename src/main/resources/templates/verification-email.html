<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Password Recovery</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #eeeeee;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .header {
      background-color: #2c3e50;
      color: #ffffff;
      text-align: center;
      padding: 40px 20px;
    }

    .header img {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
    }

    .content {
      padding: 40px 30px;
      color: #333333;
    }

    .content p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .link-box {
      font-size: 18px;
      font-weight: bold;
      background-color: #f2f2f2;
      color: #2c3e50;
      padding: 16px;
      text-align: center;
      border-radius: 8px;
      word-wrap: break-word;
    }

    .link-box a {
      text-decoration: none;
      color: #e50914;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #888888;
      background-color: #f7f7f7;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="cid:logo" alt="WatchTime Logo">
    <h1>Password Recovery</h1>
  </div>
  <div class="content">
    <p>Hello,</p>
    <p>We received a request to reset your password. To continue, please click the link below:</p>
    <div class="link-box">
      <a href="http://localhost:8080/api/auth/confirm-code/%s">Reset Your Password</a>
    </div>
    <p>This link will expire in 10 minutes. If you did not request a password reset, please ignore this email.</p>
  </div>
  <div class="footer">
    &copy; 2025 WatchTime. By Dautov Muslim
  </div>
</div>
</body>
</html>
